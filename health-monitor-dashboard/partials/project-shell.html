<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主动健康管理 - 业务监管大屏</title>
    <style id="theme-vars">
/* ========================================
   Health Monitor Dashboard - Brand CSS
   Based on Semi Design System (Dark Theme)
   ======================================== */

:root {
  /* --- Brand Prefix: hmd --- */

  /* --- Semi Design Dark Theme Backgrounds --- */
  --hmd-bg-body: #1d2129;
  --hmd-bg-card: #24292f;
  --hmd-bg-card-hover: #2a3038;
  --hmd-bg-elevated: #2c323a;
  --hmd-bg-sunken: #181c22;
  --hmd-bg-sunken-alt: #1a1f26;

  /* --- Semi Design Primary (Blue) --- */
  --hmd-color-primary: #387bff;
  --hmd-color-primary-hover: #5a93ff;
  --hmd-color-primary-active: #0e5ce6;
  --hmd-color-primary-light: rgba(56, 123, 255, 0.12);
  --hmd-color-primary-light-hover: rgba(56, 123, 255, 0.18);

  /* --- Semi Design Functional Colors --- */
  --hmd-color-success: #7ccd94;
  --hmd-color-success-light: rgba(124, 205, 148, 0.12);
  --hmd-color-warning: #f5a623;
  --hmd-color-warning-light: rgba(245, 166, 35, 0.12);
  --hmd-color-danger: #f65159;
  --hmd-color-danger-light: rgba(246, 81, 89, 0.12);
  --hmd-color-info: #387bff;
  --hmd-color-info-light: rgba(56, 123, 255, 0.12);

  /* --- Semi Design Text Colors (Dark) --- */
  --hmd-color-text-primary: #ffffff;
  --hmd-color-text-secondary: rgba(255, 255, 255, 0.7);
  --hmd-color-text-tertiary: rgba(255, 255, 255, 0.45);
  --hmd-color-text-disabled: rgba(255, 255, 255, 0.25);
  --hmd-color-text-on-primary: #ffffff;

  /* --- Semi Design Border Colors --- */
  --hmd-color-border: rgba(255, 255, 255, 0.08);
  --hmd-color-border-hover: rgba(255, 255, 255, 0.15);
  --hmd-color-border-active: rgba(56, 123, 255, 0.5);

  /* --- Health-Specific Status Colors --- */
  --hmd-health-green: #7ccd94;
  --hmd-health-green-bg: rgba(124, 205, 148, 0.1);
  --hmd-health-yellow: #f5a623;
  --hmd-health-yellow-bg: rgba(245, 166, 35, 0.1);
  --hmd-health-red: #f65159;
  --hmd-health-red-bg: rgba(246, 81, 89, 0.1);

  /* --- Chart Colors --- */
  --hmd-chart-blue: #387bff;
  --hmd-chart-cyan: #36cfc9;
  --hmd-chart-green: #7ccd94;
  --hmd-chart-yellow: #f5a623;
  --hmd-chart-orange: #f57c00;
  --hmd-chart-red: #f65159;
  --hmd-chart-purple: #a97bff;
  --hmd-chart-pink: #f759ab;

  /* --- Typography --- */
  --hmd-font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --hmd-font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;

  --hmd-font-size-display: 36px;
  --hmd-font-size-h1: 28px;
  --hmd-font-size-h2: 22px;
  --hmd-font-size-h3: 18px;
  --hmd-font-size-h4: 15px;
  --hmd-font-size-body: 14px;
  --hmd-font-size-caption: 12px;
  --hmd-font-size-small: 11px;

  --hmd-font-weight-regular: 400;
  --hmd-font-weight-medium: 500;
  --hmd-font-weight-semibold: 600;
  --hmd-font-weight-bold: 700;

  --hmd-line-height-tight: 1.25;
  --hmd-line-height-normal: 1.5;
  --hmd-line-height-relaxed: 1.75;

  /* --- Spacing --- */
  --hmd-spacing-xs: 4px;
  --hmd-spacing-sm: 8px;
  --hmd-spacing-md: 12px;
  --hmd-spacing-lg: 16px;
  --hmd-spacing-xl: 24px;
  --hmd-spacing-2xl: 32px;
  --hmd-spacing-3xl: 48px;

  /* --- Border Radius (Semi Design style) --- */
  --hmd-radius-sm: 3px;
  --hmd-radius-md: 6px;
  --hmd-radius-lg: 8px;
  --hmd-radius-xl: 12px;
  --hmd-radius-full: 9999px;

  /* --- Shadows (Dark theme, subtle) --- */
  --hmd-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --hmd-shadow-md: 0 2px 8px rgba(0, 0, 0, 0.4);
  --hmd-shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.5);
  --hmd-shadow-glow-blue: 0 0 20px rgba(56, 123, 255, 0.15);
  --hmd-shadow-glow-red: 0 0 20px rgba(246, 81, 89, 0.15);

  /* --- Dashboard Specific --- */
  --hmd-kpi-value-size: 32px;
  --hmd-kpi-label-size: 12px;
  --hmd-card-padding: 16px;
  --hmd-card-gap: 16px;
  --hmd-header-height: 56px;
}

/* Light mode overrides (not primary for dashboard, but available) */
html:not(.dark) {
  --hmd-bg-body: #f5f6f7;
  --hmd-bg-card: #ffffff;
  --hmd-bg-card-hover: #fafafa;
  --hmd-bg-elevated: #ffffff;
  --hmd-bg-sunken: #f0f1f2;
  --hmd-bg-sunken-alt: #ebedf0;
  --hmd-color-text-primary: #1d2129;
  --hmd-color-text-secondary: rgba(29, 33, 41, 0.6);
  --hmd-color-text-tertiary: rgba(29, 33, 41, 0.35);
  --hmd-color-text-disabled: rgba(29, 33, 41, 0.2);
  --hmd-color-border: rgba(29, 33, 41, 0.08);
  --hmd-color-border-hover: rgba(29, 33, 41, 0.15);
  --hmd-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
  --hmd-shadow-md: 0 2px 8px rgba(0, 0, 0, 0.08);
  --hmd-shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--hmd-background); color: var(--hmd-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: var(--hmd-bg-body); font-family: var(--hmd-font-family); color: var(--hmd-color-text-primary);">

  <!-- ===== Header Bar ===== -->
  <header style="height: var(--hmd-header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--hmd-spacing-xl); background-color: var(--hmd-bg-body); border-bottom: 1px solid var(--hmd-color-border); position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-sizing: border-box;">

    <!-- Left: Logo + Brand Name -->
    <div style="display: flex; align-items: center; gap: var(--hmd-spacing-sm); flex-shrink: 0;">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="28" height="28" rx="6" fill="var(--hmd-color-primary-light)"/>
        <path d="M14 22C14 22 6 18 6 12C6 8.686 8.686 6 12 6C13.1 6 14 6.5 14 6.5C14 6.5 14.9 6 16 6C19.314 6 22 8.686 22 12C22 18 14 22 14 22Z" fill="var(--hmd-color-primary)" opacity="0.3"/>
        <path d="M6 14H10L12 10L14 18L16 12L18 14H22" stroke="var(--hmd-color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="font-size: var(--hmd-font-size-h4); font-weight: var(--hmd-font-weight-semibold); color: var(--hmd-color-text-primary); white-space: nowrap;">主动健康管理</span>
    </div>

    <!-- Center: Page Title (Mutable Slot) -->
    <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center;">
      <!-- SLOT: pageTitle -->
      <h1 style="margin: 0; font-size: var(--hmd-font-size-h4); font-weight: var(--hmd-font-weight-medium); color: var(--hmd-color-text-secondary); white-space: nowrap;">业务监管大屏</h1>
    </div>

    <!-- Right: Date/Time + User Avatar -->
    <div style="display: flex; align-items: center; gap: var(--hmd-spacing-lg); flex-shrink: 0;">
      <!-- Date/Time Display -->
      <span id="header-datetime" style="font-size: var(--hmd-font-size-caption); color: var(--hmd-color-text-tertiary); font-family: var(--hmd-font-family-mono); white-space: nowrap;"></span>
      <!-- User Avatar -->
      <div style="display: flex; align-items: center; gap: var(--hmd-spacing-sm);">
        <div style="width: 32px; height: 32px; border-radius: var(--hmd-radius-full); background-color: var(--hmd-color-primary-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="9" cy="6" r="3" fill="var(--hmd-color-primary)"/>
            <path d="M3 17C3 13.686 5.686 11 9 11C12.314 11 15 13.686 15 17" stroke="var(--hmd-color-primary)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span style="font-size: var(--hmd-font-size-caption); color: var(--hmd-color-text-secondary); white-space: nowrap;">管理员</span>
      </div>
    </div>
  </header>

  <!-- ===== Main Content Area ===== -->
  <main style="position: fixed; top: var(--hmd-header-height); left: 0; right: 0; bottom: 0; overflow: hidden; padding: var(--hmd-spacing-lg); box-sizing: border-box;">

    <!-- SLOT: pageContent -->
    <!-- Sub-Agents: Insert dashboard grid/content here -->

  </main>

  <!-- Clock Script (allowed: modifies textContent only, not DOM structure) -->
  <script>
    (function() {
      var el = document.getElementById('header-datetime');
      if (!el) return;
      function tick() {
        var now = new Date();
        var y = now.getFullYear();
        var m = String(now.getMonth() + 1).padStart(2, '0');
        var d = String(now.getDate()).padStart(2, '0');
        var h = String(now.getHours()).padStart(2, '0');
        var mi = String(now.getMinutes()).padStart(2, '0');
        var s = String(now.getSeconds()).padStart(2, '0');
        el.textContent = y + '-' + m + '-' + d + ' ' + h + ':' + mi + ':' + s;
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>

</body>
</html>
