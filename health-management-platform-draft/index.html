<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主动健康管理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f6f7;
            color: #1d2129;
            display: flex;
            height: 100vh;
        }

        /* === Sidebar === */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: #ffffff;
            border-right: 1px solid rgba(29, 33, 41, 0.08);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(29, 33, 41, 0.12); border-radius: 4px; }

        .sidebar-logo {
            padding: 20px 16px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(29, 33, 41, 0.08);
        }
        .sidebar-logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #387bff, #0e5ce6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff; font-weight: 700;
        }
        .sidebar-logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #1d2129;
            letter-spacing: 0.02em;
        }

        .sidebar-section-label {
            padding: 16px 16px 6px;
            font-size: 11px;
            font-weight: 500;
            color: rgba(29, 33, 41, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            margin: 1px 8px;
            border-radius: 8px;
            color: rgba(29, 33, 41, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }
        .nav-item:hover {
            background: rgba(29, 33, 41, 0.04);
            color: rgba(29, 33, 41, 0.9);
        }
        .nav-item.active {
            background: rgba(56, 123, 255, 0.08);
            color: #387bff;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: #387bff;
            border-radius: 0 3px 3px 0;
        }
        .nav-icon {
            width: 18px; height: 18px;
            flex-shrink: 0;
            opacity: 0.7;
        }
        .nav-item.active .nav-icon { opacity: 1; }

        .sidebar-divider {
            height: 1px;
            background: rgba(29, 33, 41, 0.08);
            margin: 8px 16px;
        }

        .sidebar-user {
            padding: 16px;
            border-top: 1px solid rgba(29, 33, 41, 0.08);
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #387bff, #0e5ce6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: 600;
        }
        .sidebar-user-info {
            flex: 1; min-width: 0;
        }
        .sidebar-user-name {
            font-size: 13px; font-weight: 600; color: #1d2129;
        }
        .sidebar-user-role {
            font-size: 11px; color: rgba(29, 33, 41, 0.35);
        }

        /* === Main Content === */
        .main-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .main-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* === Loading Indicator === */
        .loading-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: transparent;
            z-index: 10;
        }
        .loading-bar.active {
            background: linear-gradient(90deg, transparent, #387bff, transparent);
            animation: loadingSlide 0.8s ease infinite;
        }
        @keyframes loadingSlide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* === Breadcrumb === */
        .breadcrumb-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 36px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(29, 33, 41, 0.08);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
            color: rgba(29, 33, 41, 0.4);
            z-index: 5;
            gap: 6px;
        }
        .breadcrumb-bar span.current {
            color: rgba(29, 33, 41, 0.85);
        }
        .breadcrumb-bar .sep {
            color: rgba(29, 33, 41, 0.2);
        }

        /* SVG Icons inline */
        .icon-svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

        <div class="sidebar-section-label">智能服务</div>
        <a class="nav-item" data-page="alert-workbench.html" onclick="navigate('alert-workbench.html', this)">
            <svg class="nav-icon icon-svg" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

        <a class="nav-item" data-page="treatment-plan.html" onclick="navigate('treatment-plan.html', this)">

            <span>调理方案</span>
        </a>
        <a class="nav-item" data-page="service-package.html" onclick="navigate('service-package.html', this)">
            <svg class="nav-icon icon-svg" viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>

            <span>设备管理</span>

        <a class="nav-item" data-page="cms-banner.html" onclick="navigate('cms-banner.html', this)">

        <div class="sidebar-section-label">系统设置</div>
        <a class="nav-item" data-page="system-basic.html" onclick="navigate('system-basic.html', this)">

        <div class="sidebar-user">

    <div class="main-content">
        <div class="loading-bar" id="loadingBar"></div>
        <div class="breadcrumb-bar" id="breadcrumb">
            <span>首页</span>
            <span class="sep">›</span>
            <span class="current">在管居民</span>
        </div>
        <iframe id="contentFrame" src="pages/resident-list.html" onload="onFrameLoaded()"></iframe>
    </div>

    <script>
        const breadcrumbMap = {
            'dashboard.html': '业务大屏',
            'resident-list.html': '在管居民',
            'resident-profile.html': '居民健康画像',
            'resident-binding.html': '居民设备绑定',
            'doctor-approval.html': '医生入驻审批',
            'doctor-approval-detail.html': '审批详情',
            'enrolled-doctors.html': '已入驻医生',
            'doctor-homepage.html': '医生工作台',
            'doctor-profile.html': '医生信息维护',
            'my-patients.html': '我的病人',
            'alert-workbench.html': '预警工作台',
            'treatment-plan.html': '调理方案',
            'treatment-plan-editor.html': '方案编辑器',
            'plan-template.html': '方案模板',
            'plan-tracking.html': '方案跟踪',
            'service-package.html': '服务包管理',
            'product-management.html': '商品管理',
            'im-chat.html': '即时通讯',
            'template-phrases.html': '模板话术',
            'device-management.html': '设备管理',
            'cms-banner.html': 'Banner管理',
            'cms-content.html': '内容管理',
            'cms-recommend-doctors.html': '推荐医生',
            'system-basic.html': '系统设置',
            'system-notifications.html': '通知设置',
            'system-alert-rules.html': '预警规则',
            'operation-log.html': '操作日志',
            'sub-account.html': '子账号管理'
        };

        function navigate(page, el) {
            // Update active state
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            // Update breadcrumb
            const name = breadcrumbMap[page] || page;
            document.getElementById('breadcrumb').innerHTML =
                '<span>首页</span><span class="sep">›</span><span class="current">' + name + '</span>';

            // Show loading
            const bar = document.getElementById('loadingBar');
            bar.classList.add('active');

            // Load page
            const frame = document.getElementById('contentFrame');
            frame.src = 'pages/' + page;
        }

        function navigateDashboard(page, el) {
            window.open(page, '_blank');
        }

        function onFrameLoaded() {
            document.getElementById('loadingBar').classList.remove('active');
        }
    </script>
</body>
</html>
